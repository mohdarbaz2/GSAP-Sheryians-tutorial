<!DOCTYPE html>
<html>
<head>
  <title>Grid Gallery</title>
  <link rel="stylesheet" href="style.css">
  <style>
    *{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:#111;
  color:white;
}
.gallery{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:15px;
  padding:20px;
}
.gallery img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
}
.gallery img{
  transition:0.3s;
  cursor:pointer;
}

.gallery img:hover{
  transform:scale(1.1);
}
/* Tablet */
@media(max-width:900px){
  .gallery{
    grid-template-columns: repeat(2, 1fr);
  }
}

/* Mobile */
@media(max-width:500px){
  .gallery{
    grid-template-columns: 1fr;
  }
}
.title{
  text-align:center;
  padding:20px;
}
  </style>
</head>
<body>

<h1 class="title">My Photo Gallery</h1>

<div class="gallery">
  <img src="https://picsum.photos/300?1">
  <img src="https://picsum.photos/300?2">
  <img src="https://picsum.photos/300?3">
  <img src="https://picsum.photos/300?4">
  <img src="https://picsum.photos/300?5">
  <img src="https://picsum.photos/300?6">
  <img src="https://picsum.photos/300?7">
  <img src="https://picsum.photos/300?8">
</div>

</body>
</html>
