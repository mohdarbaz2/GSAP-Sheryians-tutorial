<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .gallery img{
  width:100%;
  border-radius:10px;
  display:block;
}
.gallery{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 10px;
  gap:15px;
  padding:20px;
}
@media(max-width:900px){
  .gallery{ grid-template-columns: repeat(2,1fr); }
}
@media(max-width:500px){
  .gallery{ grid-template-columns: 1fr; }
}
    </style>
</head>
<body>
    <div class="gallery">
  <div class="item"><img src="https://picsum.photos/300/400?1"></div>
  <div class="item"><img src="https://picsum.photos/300/250?2"></div>
  <div class="item"><img src="https://picsum.photos/300/500?3"></div>
  <div class="item"><img src="https://picsum.photos/300/350?4"></div>
  <div class="item"><img src="https://picsum.photos/300/450?5"></div>
  <div class="item"><img src="https://picsum.photos/300/300?6"></div>
  <div class="item"><img src="https://picsum.photos/300/380?7"></div>
  <div class="item"><img src="https://picsum.photos/300/420?8"></div>
</div>
<script>
   
const grid = document.querySelector(".gallery");
const rowHeight = 10;
const gap = 15;

grid.querySelectorAll(".item").forEach(item => {
  const img = item.querySelector("img");

  img.onload = () => {
    const rowSpan = Math.ceil(
      (img.getBoundingClientRect().height + gap) / rowHeight
    );
    item.style.gridRowEnd = "span " + rowSpan;
  };
});

</script>
</body>
</html>
