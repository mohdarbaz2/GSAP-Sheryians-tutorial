<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            width: 1000px;
            height: 540px;
            background-color: red;

        }
        .row1{
            width: 1000px;
            height: 100px;
            color: white;
            text-align: center;
            font-weight: bold;
            font-style: italic;
            font-size: 20px;
            text-decoration: underline;
            text-transform: uppercase;
            background-color: purple;
            word-spacing: 25px;
            letter-spacing: 5px;
        }
        .row2{
            width: 1000px;
            height: 40px;
            background-color: yellow;
            /* float: left; */
        }
        .row2c1, .row2c2, .row2c3, .row2c4, .row2c5{
            width: 200px;
            height: 40px;
            float: left;
            background-color: yellowgreen;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="row1">Welcome to WS cube tech</div>
        <div class="row2">
            <div class="row2c1" style="background-color: brown;">Home</div>
            <div class="row2c2" style="background-color: green;">About</div>
            <div class="row2c3" style="background-color: yellow;">Course</div>
            <div class="row2c4" style="background-color: salmon;">Gallery</div>
            <div class="row2c5" style="background-color: pink;">Contact</div>   
        </div>
    </div>
</body>
</html>
